services:
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:latest
    container_name: wg-easy
    environment:
      - LANG=en
      - WG_HOST=localhost
      - PASSWORD_HASH=$$2a$$10$$IDEtxHdc9o4FGGQU3aoUYOZ5FhpDBSkNiI9y61RNQYyDuXngDM4Ty
      - PORT=51821
      - WG_PORT=51820
      - WG_DEFAULT_DNS=1.1.1.1,8.8.8.8
      - WG_DEFAULT_ADDRESS=10.8.0.x
      - UI_TRAFFIC_STATS=true
    volumes:
      - wg-easy-data:/etc/wireguard
    ports:
      - "51820:51820/udp"
      - "51821:51821/tcp"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    restart: unless-stopped

  internal-api:
    image: node:20-alpine
    container_name: internal-api
    working_dir: /app
    volumes:
      - ./docker/internal-api:/app
    command: node server.js
    ports:
      - "4000:4000"
    restart: unless-stopped

  dashboard:
    image: node:20-alpine
    container_name: vpn-dashboard
    working_dir: /app
    volumes:
      - ./dashboard:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    environment:
      - INTERNAL_API_URL=http://internal-api:4000
    ports:
      - "3000:3000"
    depends_on:
      - internal-api
    restart: unless-stopped

volumes:
  wg-easy-data:
